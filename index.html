<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta BEM</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <img src="assets/img/logo.png" alt="Logo" class="card__image">

    <div class="card__content">
      <h2 class="card__content__title">Aprendices ADSO</h2>    
      <p class="card__content__description">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vitae voluptas reprehenderit tenetur! Deserunt totam enim aliquam nostrum soluta ex voluptatibus eaque.
      </p>

      <ul class="card__features">
        <li>✔ Responsabilidad</li>
        <li>✔ Trabajo en equipo</li>
        <li>✔ Innovación</li>
      </ul>

      <div class="card__progress">
        <div class="card__progress-bar" style="width:70%"></div>
      </div>
    </div>

    <div class="card__actions">
      <button class="card__button card__button--primary">Aceptar</button>
      <button class="card__button card__button--secondary">Cancelar</button>
    </div>

    <div class="card__footer">
      <a href="#">🌐 Web</a>
      <a href="#">📘 Facebook</a>
      <a href="#">📷 Instagram</a>
    </div>
  </div>
</body>
</html>
